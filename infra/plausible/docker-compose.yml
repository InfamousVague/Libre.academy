# Self-hosted Plausible Community Edition for stats.libre.academy.
#
# DEPLOYMENT MODEL: this stack assumes the VPS already runs a
# reverse proxy (Caddy / Nginx) on ports 80/443 serving
# `libre.academy` + `api.libre.academy`. Plausible's app server
# binds ONLY to `127.0.0.1:8000` — the host's existing reverse
# proxy adds the TLS-terminated `stats.libre.academy` vhost that
# forwards there. See `Caddyfile.snippet` / `nginx.snippet` in
# this directory for drop-in vhost configs.
#
# If you're starting fresh on a host with NO existing reverse
# proxy, see `docker-compose.standalone.yml` for the all-in-one
# variant (Caddy bundled inside the compose stack, binds 80/443
# directly).
#
# Stack:
#   - plausible          → the app server (Phoenix / Elixir).
#   - plausible_db       → PostgreSQL for app data (users, sites,
#                          dashboards, auth tokens).
#   - plausible_events_db → ClickHouse for analytics events (hot path).
#
# Deploy:
#   1. Point DNS A for `stats.libre.academy` at the VPS IP
#      (149.28.120.197 for libre.academy's current Vultr box).
#   2. Add the vhost snippet to the host's reverse-proxy config
#      (see Caddyfile.snippet or nginx.snippet in this dir) and
#      reload the proxy.
#   3. Copy `.env.example` → `.env`, fill in secrets.
#   4. `docker compose pull && docker compose up -d`.
#   5. Visit `https://stats.libre.academy`, register the first
#      admin user, add `libre.academy` as a site.
#
# Image tags pinned to a known-good release. Bump intentionally
# and re-test; Plausible's docker tags follow semver-ish but
# breaking changes happen on majors.
services:
  plausible_db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - plausible_db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

  plausible_events_db:
    image: clickhouse/clickhouse-server:24.12-alpine
    restart: unless-stopped
    # CLICKHOUSE_SKIP_USER_SETUP=1 disables the default-user password
    # generation that ClickHouse 24.x introduced. Without it,
    # Plausible's connection string (no password in the URL) fails
    # with `AUTHENTICATION_FAILED`. The container only listens on
    # the Docker bridge network — never exposed to the host —
    # so the no-password default is safe.
    environment:
      CLICKHOUSE_SKIP_USER_SETUP: 1
    volumes:
      - plausible_events_data:/var/lib/clickhouse
      - ./clickhouse-config.xml:/etc/clickhouse-server/config.d/logging.xml:ro
      - ./clickhouse-user-config.xml:/etc/clickhouse-server/users.d/logging.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  plausible:
    image: ghcr.io/plausible/community-edition:v3.0.1
    restart: unless-stopped
    command: sh -c "/entrypoint.sh db createdb && /entrypoint.sh db migrate && /entrypoint.sh run"
    depends_on:
      - plausible_db
      - plausible_events_db
    ports:
      # ONLY bind to 127.0.0.1 — the host's existing reverse proxy
      # (Caddy or Nginx, terminating TLS on 443) forwards traffic
      # here. Binding to 0.0.0.0 would expose Plausible's HTTP
      # endpoint without TLS, which is a leak risk on a shared VPS.
      - "127.0.0.1:8000:8000"
    env_file:
      - .env

volumes:
  plausible_db_data:
  plausible_events_data:

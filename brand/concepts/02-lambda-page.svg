<!--
  Concept 2 — Lambda as an open page.
  Reads as: CS-coded (lambda calculus, functional programming) +
  literary (the lambda's tent silhouette also reads as an open
  book seen edge-on, or pages held aloft).

  Why this works: lambda is the most academy-coded glyph in
  programming — it's universally recognised in CS departments,
  and shows up as the LISP / Haskell / Erlang signifier.
  Pairing it with the academy positioning is on-the-nose in a
  good way.

  Mark is bilaterally symmetric, so it crops cleanly for any
  square avatar.
-->
<svg viewBox="0 0 80 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Libre Academy">
  <defs>
    <style>
      .ink { fill: none; stroke: #1f2330; stroke-width: 3; stroke-linejoin: round; stroke-linecap: round; }
      .accent { fill: none; stroke: #c9a76b; stroke-width: 2.5; stroke-linecap: round; }
    </style>
  </defs>
  <!-- Lambda silhouette: top peak at (40,10), legs splaying to (16,54) and (64,54).
       The right leg is slightly thicker, mimicking the lowercase Greek λ glyph
       proportions. -->
  <path class="ink" d="M 26 54 L 40 18 L 54 54"/>
  <!-- Internal stroke that turns the lambda into an open book / spine fold:
       a vertical line down from the apex implying a centerfold. The pages
       fall away on either side. -->
  <line class="ink" x1="40" y1="18" x2="40" y2="50" opacity="0.55"/>
  <!-- Underline as a horizontal accent — suggests both a baseline (typography)
       and a closed back-cover. Picks up the bone-amber accent for warmth. -->
  <line class="accent" x1="20" y1="58" x2="60" y2="58"/>
</svg>

<!--
  Wordmark — the typography lockup.
  Reads as: a serif "libre" (literary, academic) + a tracked
  small-caps "ACADEMY" (scholastic, slightly civic). The two
  weights echo the product itself: prose body + monospace code.

  Stack: a serif font for "libre" (Iowan Old Style, Charter,
  Source Serif Pro — anything with sturdy slab-y feet works),
  a humanist sans / small caps for "ACADEMY".

  This SVG uses generic serif / sans-serif via system fonts so it
  renders without bundling — for production we'll want to commit
  to specific webfonts (e.g. Source Serif 4 + Inter), but the
  proportions stay.

  Two configurations:
    • Stacked  — "libre" stacked over "ACADEMY". For square spaces
      (App Store, social avatar with the symbol beside it).
    • Inline   — "libre · ACADEMY". For headers / footers / cards.
-->
<svg viewBox="0 0 320 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Libre Academy wordmark">
  <defs>
    <style>
      .libre { font-family: "Iowan Old Style", "Charter", "Source Serif Pro", Georgia, serif; font-size: 56px; font-weight: 500; fill: #1f2330; letter-spacing: -0.01em; }
      .academy { font-family: "Inter", "Helvetica Neue", Arial, sans-serif; font-size: 14px; font-weight: 600; fill: #1f2330; letter-spacing: 0.32em; text-transform: uppercase; }
      .rule { stroke: #c9a76b; stroke-width: 2; stroke-linecap: round; }
    </style>
  </defs>

  <!-- Stacked layout (top of the artboard) -->
  <text class="libre" x="20" y="60">libre</text>
  <line class="rule" x1="20" y1="72" x2="155" y2="72"/>
  <text class="academy" x="20" y="90">ACADEMY</text>

  <!-- Inline layout (right side — smaller for compactness) -->
  <text class="libre" x="200" y="60" style="font-size:36px">libre</text>
  <line class="rule" x1="278" y1="55" x2="280" y2="55"/>
  <text class="academy" x="284" y="60" style="font-size:11px">ACADEMY</text>
</svg>

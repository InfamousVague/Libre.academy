<!--
  Concept 1 — Open book bracketed by curly braces.
  Reads as: book → code, with both elements visible at first glance.
  The book is the source material; the curly braces frame it as a
  function body. Strongest "this is for programmers learning from
  books" signal of any concept here.

  Mark dimensions: 80×64 (5:4). Square crop for favicons just trims
  the side margins — the open book stays centered.

  Colours pull from the existing app's bone palette so the new mark
  drops into the live UI without needing a theme refresh.
-->
<svg viewBox="0 0 80 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Libre Academy">
  <defs>
    <style>
      .ink { fill: none; stroke: #1f2330; stroke-width: 2.5; stroke-linejoin: round; stroke-linecap: round; }
      .accent { fill: none; stroke: #c9a76b; stroke-width: 2.25; stroke-linecap: round; }
      .page { fill: #f4eedd; }
    </style>
  </defs>
  <!-- Open-book pages: two leaves meeting at a center spine, top edge gently lifted -->
  <path class="page" d="M 18 14 L 40 18 L 62 14 L 62 50 L 40 54 L 18 50 Z"/>
  <path class="ink" d="M 18 14 L 40 18 L 62 14 L 62 50 L 40 54 L 18 50 Z"/>
  <!-- Spine fold -->
  <line class="ink" x1="40" y1="18" x2="40" y2="54"/>
  <!-- Curly-brace flourishes wrapping the book left + right.
       The braces "open" away from the book — code arms holding
       the source material between them. -->
  <path class="accent" d="M 12 18 Q 6 32 12 46"/>
  <path class="accent" d="M 68 18 Q 74 32 68 46"/>
  <!-- A faint horizontal rule on each page — suggests text without committing to specific letters -->
  <line class="ink" x1="24" y1="32" x2="36" y2="34" opacity="0.35"/>
  <line class="ink" x1="44" y1="34" x2="56" y2="32" opacity="0.35"/>
</svg>

name: CI

# Lint + web-variant build. Strictly the two checks the user wants
# before a PR can land: lint (tsc --noEmit, run as `npm run lint`)
# and a build that doesn't error. No unit / integration / e2e
# tests — those live in a future test framework that's not yet
# wired up. Desktop bundles live in desktop-build.yml.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Cancel older in-flight runs on the same branch so a quick
# follow-up push doesn't waste a CI slot.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Libre' package.json declares `@mattmattmattmatt/base` as
      # a file:../../Libs/base dependency — i.e. it expects a sibling
      # `Libs/base/` two directories above the repo. Locally that's
      # /Users/matt/Development/{Apps/Libre,Libs/base}; in CI we have
      # to materialise the same layout. Checkout into _base inside
      # the workspace, then symlink it into place at the absolute
      # path the file: spec resolves to.
      - name: "Checkout @mattmattmattmatt/base (file: dep)"
        uses: actions/checkout@v4
        with:
          repository: InfamousVague/base
          path: _base
          ref: main

      - name: "Symlink _base/ into Libs/base/ for the file: dep"
        run: |
          mkdir -p /home/runner/work/Libs
          ln -sfn "$GITHUB_WORKSPACE/_base" /home/runner/work/Libs/base
          # Sanity: the relative path from this repo's package.json
          # should resolve to a real directory now.
          test -d ../../Libs/base/primitives \
            || (echo "Libs/base/primitives missing — symlink wiring is wrong"; exit 1)

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install deps
        run: npm ci

      # ImageMagick is needed by extract-starter-courses.mjs for
      # cover-art resize during the build chain.
      - name: Install ImageMagick
        run: sudo apt-get update -qq && sudo apt-get install -y -qq imagemagick

      # Cache the vendor-staging output so consecutive runs don't
      # re-bundle Babel + React + Three.js + Svelte.
      - name: Cache vendor assets
        uses: actions/cache@v4
        with:
          path: src-tauri/resources/vendor
          key: vendor-${{ hashFiles('package-lock.json', 'scripts/vendor-cdn-deps.mjs') }}
          restore-keys: |
            vendor-

      - name: Lint (tsc --noEmit)
        run: npm run lint

      - name: Build web variant
        env:
          LIBRE_TARGET: web
        run: npm run build:web

      - name: Upload web build artefact
        uses: actions/upload-artifact@v4
        with:
          name: dist-web
          path: dist-web
          retention-days: 7

name: Desktop Build

# Matrix-builds the Tauri desktop bundles on each target platform's
# native runner. Cross-compiling from a single host (Mac → Windows
# etc.) is technically possible with Tauri but flaky in practice —
# MSVC linker emulation, AppIndicator/glib mismatches, signing
# fights — so we just lean on GitHub Actions runners for each OS.
#
# Trigger model:
#   - push to main          → builds on all 3 platforms, artefacts
#                              attached to the workflow run. Smoke
#                              test that every change still produces
#                              installable bundles.
#   - tag push (v*)         → builds Linux + Windows (NOT macOS) and
#                              uploads bundles to the published GitHub
#                              release named after the tag. macOS is
#                              skipped because the maintainer's signed
#                              + notarized DMG comes from
#                              `make local-release` running on their
#                              local machine — the CI runner doesn't
#                              have the Apple Developer ID cert. The
#                              local upload runs first; CI appends
#                              Linux/Windows to the same release.
#   - workflow_dispatch     → ad-hoc build, artefacts only (all 3).
#
# COST WARNING: this fires on every push to main. macOS runners
# bill at 10× the per-minute rate of Linux on GitHub Actions and
# this workflow takes ~25-40 minutes per platform on first run
# (~5-15 min when caches are warm). On a free-tier account budget
# ~370 minutes per push (~5 pushes / month within the free quota).
# If that's too much, narrow the trigger to:
#   push:
#     branches: [main]
#     paths:
#       - 'src-tauri/**'
#       - 'src/**'
#       - 'package*.json'
# … so doc / CI-only changes don't burn macOS time.
#
# Out of scope here:
#   - Code-signing / notarization (Apple Developer ID, Windows
#     Authenticode). When ready, add signing certs as secrets and
#     pass them via `TAURI_SIGNING_*` env vars to tauri-action.
#   - The Linux runner is pinned to ubuntu-22.04, not 24.04 — newer
#     glibc breaks AppImage portability on older user distros.
on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write  # needed to draft a GitHub release on tag push

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      # One platform's failure shouldn't kill the others — we want
      # to see e.g. a Windows-only build error without losing the
      # macOS + Linux artefacts.
      fail-fast: false
      matrix:
        include:
          # macOS skips its build step on tag push (see `if:` on the
          # Build step below). The signed + notarized DMG is produced
          # locally via `make local-release` — the maintainer's
          # Apple Developer ID cert isn't on the CI runner, so an
          # unsigned ad-hoc CI build would race against the signed
          # one for the same release. The matrix entry stays so the
          # push-to-main + workflow_dispatch smoke-test paths still
          # exercise the Mac toolchain.
          - os: macos-latest
            label: macOS (Universal)
            # Universal binary covers both Apple Silicon and Intel
            # in one .dmg. Doubles compile time but halves what we
            # have to ship + support.
            tauri-args: '--target universal-apple-darwin'
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - os: ubuntu-22.04
            label: Linux (x64)
            tauri-args: ''
            rust-targets: ''
          - os: windows-latest
            label: Windows (x64)
            tauri-args: ''
            rust-targets: ''

    steps:
      - uses: actions/checkout@v4

      # Same Libs/base file: dep dance as ci.yml — package.json
      # references @mattmattmattmatt/base as a sibling repo two
      # levels up, so we materialise that layout on every runner.
      - name: 'Checkout @mattmattmattmatt/base (file: dep)'
        uses: actions/checkout@v4
        with:
          repository: InfamousVague/base
          path: _base
          ref: main

      - name: 'Wire _base/ into ../../Libs/base for the file: dep'
        shell: bash
        run: |
          mkdir -p ../../Libs
          # Copy rather than symlink so this works identically on
          # Linux, macOS, and Windows runners (Windows symlink
          # creation needs admin rights or developer mode).
          cp -r _base ../../Libs/base
          # Sanity check: relative path from package.json should
          # now resolve to a real directory.
          test -d ../../Libs/base/primitives \
            || (echo "Libs/base/primitives missing — wiring is wrong"; exit 1)

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      # Caches the entire src-tauri/target directory + the cargo
      # registry. Without this every CI run recompiles the whole
      # Rust dependency graph (~10 minutes per platform). Cache key
      # is keyed off Cargo.lock so a dependency bump invalidates
      # cleanly.
      - name: Cache Rust target
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # Linux needs the WebKitGTK + AppIndicator + GTK headers to
      # compile Tauri's webview integration, plus patchelf to fix
      # rpaths in the AppImage bundle.
      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev \
            build-essential \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            imagemagick

      # ImageMagick is what extract-starter-courses.mjs uses to
      # resize cover art; the build's smoke checks expect covers
      # in the dist, so it must be present on every host.
      - name: Install ImageMagick (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install imagemagick

      - name: Install ImageMagick (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install imagemagick.app -y --no-progress

      # macOS-only: tauri.conf.json hardcodes a Developer ID
      # signing identity (the maintainer's local cert hash). On CI
      # that identity isn't in the runner's keychain, so codesign
      # fails with "The specified item could not be found in the
      # keychain." Swap it to "-" (ad-hoc signing) just for the CI
      # build — no edit to the on-disk config that would affect
      # local developer builds. Produces an unsigned bundle that
      # Gatekeeper warns about; proper code-signing is the
      # follow-up signing/notarization step (see workflow header).
      - name: 'Override macOS signing identity for CI (ad-hoc)'
        if: matrix.os == 'macos-latest'
        run: |
          jq '.bundle.macOS.signingIdentity = "-"' src-tauri/tauri.conf.json > /tmp/conf.json
          mv /tmp/conf.json src-tauri/tauri.conf.json
          echo "Patched signingIdentity to '-' for CI."

      - name: Install npm deps
        run: npm ci

      # Cache the vendor-staging output so consecutive runs don't
      # re-bundle Babel + React + Three.js + Svelte. Mirrors ci.yml
      # — same cache key so web + desktop CI share the artefact.
      - name: Cache vendor assets
        uses: actions/cache@v4
        with:
          path: src-tauri/resources/vendor
          key: vendor-${{ hashFiles('package-lock.json', 'scripts/vendor-cdn-deps.mjs') }}
          restore-keys: |
            vendor-

      # tauri-action wraps `tauri build`, runs the matrix args, and
      # — when tagName is set — uploads the produced bundles to the
      # GitHub release named after the tag. On manual dispatch we
      # leave tagName empty so it just builds + uploads as a workflow
      # artefact (handled by upload-artifact below).
      #
      # `releaseDraft: false` matters here: `make local-release`
      # publishes the macOS DMG into a NON-draft release first, and
      # if we set draft=true, tauri-action's upload to the existing
      # published release was silently dropping the assets (or going
      # to a separate hidden draft). With draft=false it appends to
      # whatever's already there — the Linux .AppImage/.deb and
      # Windows .msi/.exe land alongside the local Mac DMG.
      # Skip the macOS build entirely on tag push: we don't want CI's
      # ad-hoc-signed Universal DMG racing the signed/notarized
      # aarch64 DMG that `make local-release` uploads from the
      # maintainer's machine. Linux + Windows still build and append.
      # On push-to-main + workflow_dispatch the gate is open so all
      # three platforms get smoke-tested.
      - name: Build (Tauri bundle)
        if: ${{ !(matrix.os == 'macos-latest' && github.ref_type == 'tag') }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # OTA-updater signing. Both vars MUST be set as repo
          # secrets — without them tauri-action skips signing the
          # update artifacts (`*.app.tar.gz`, `*.msi.zip`, `*.AppImage.tar.gz`)
          # and DOESN'T emit a `latest.json` manifest, breaking the
          # OTA flow entirely. See README / docs for the one-time
          # secret-setup steps; the keypair lives in the maintainer's
          # `~/.tauri/libre-updater.key` and was generated via
          # `tauri signer generate`.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && format('Libre {0}', github.ref_name) || '' }}
          releaseBody: ${{ github.ref_type == 'tag' && format('Signed and notarized macOS release. Linux + Windows builds attached automatically by CI.', github.ref_name) || '' }}
          releaseDraft: false
          prerelease: false
          # `updaterJsonPreferNsis: true` makes the generated
          # latest.json point at the NSIS .exe-installer for Windows
          # rather than the .msi (smaller delta + supports silent
          # background install which the updater needs).
          updaterJsonPreferNsis: true
          args: ${{ matrix.tauri-args }}

      # Always upload the bundle artefacts to the workflow run too,
      # whether or not we created a release. Lets a maintainer grab
      # a build off any dispatch run for ad-hoc QA. Skip on the
      # macOS-tag-push path since the build was skipped there too.
      - name: Upload bundle artefacts
        if: ${{ !(matrix.os == 'macos-latest' && github.ref_type == 'tag') }}
        uses: actions/upload-artifact@v4
        with:
          name: libre-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.msi.zip
            src-tauri/target/release/bundle/**/*.nsis.zip
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.app.tar.gz
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.AppImage.tar.gz
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.rpm
            src-tauri/target/release/bundle/**/*.sig
            src-tauri/target/universal-apple-darwin/release/bundle/**/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/**/*.app.tar.gz
            src-tauri/target/universal-apple-darwin/release/bundle/**/*.sig
          retention-days: 14
          if-no-files-found: warn

  # Post-matrix step: assemble a unified latest.json that lists every
  # platform's updater bundle. tauri-action's per-job latest.json
  # output gets clobbered by whichever matrix entry uploads last —
  # this job runs ONCE after the matrix and rebuilds the manifest
  # from the release's actual assets, so all 3 platforms appear.
  # Tag-push only; smoke-test runs (push-to-main) skip it because
  # there's no release to attach a manifest to.
  build-update-manifest:
    name: Build OTA updater manifest
    needs: build
    if: github.ref_type == 'tag'
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # Best-effort: the script tolerates Mac assets not being there
      # yet (local-release uploads them on its own cadence). On a fresh
      # tag-push, we'd typically run after CI's Linux + Windows assets
      # have landed and BEFORE local-release's Mac upload finishes —
      # the local-release Makefile target re-runs `make update-manifest`
      # at the end so the final manifest includes Mac too.
      - name: Assemble latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/build-updater-manifest.mjs "${{ github.ref_name }}"

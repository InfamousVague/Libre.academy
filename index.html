<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- `viewport-fit=cover` lets the page draw into iOS's safe-area
         zone (under the home indicator, behind the dynamic island).
         Without this, WebKit auto-pads the body to keep content
         strictly inside the safe area, which leaves a visible black
         strip at the bottom of the mobile build. We handle our own
         safe-area math via `env(safe-area-inset-*)` in MobileApp.css
         + MobileTabBar.css, so opting into edge-to-edge here is
         what actually delivers the "scroll to the bottom of the
         phone window" feel.
         `maximum-scale=1.0, user-scalable=no` disables pinch-zoom
         AND the input-focus auto-zoom on iOS. The app is its own
         window, not a web page; double-tapping a button shouldn't
         leave the layout zoomed in. iOS 10+ ignores user-scalable=no
         in mobile Safari for accessibility, but inside a Tauri
         WKWebView (where we control the host) it's still honored,
         and the maximum-scale=1.0 alone stops the auto-zoom. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <link rel="icon" type="image/png" href="/libre_app_icon.png" />
    <link rel="apple-touch-icon" href="/libre_app_icon.png" />
    <title>Libre</title>
    <!-- Pre-React preloader. The main bundle + Monaco take ~1s to parse
         on a cold launch and React's bootloader can't paint until the
         module graph resolves — so without this inline block the user
         stares at a black window.

         The markup + styling mirror the React FishbonesLoader and
         pulsing) fish, and a halftone-dot purple/pink gradient
         background. Without this mirroring there's a visible jump
         between the inline preloader and the React loader on cold
         start (the React one fades in over the inline preloader as
         body.is-booted flips). App.tsx flips that class inside its
         mount effect (see src/main.tsx). -->
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0a0a0a;
        color: #eaeaea;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      }
      /* Bone tone — matches FishbonesLoader's `--fb-bone-color`. */
      #preloader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        z-index: 9999;
        /* Solid dark base. The halftone wash + dot stencil layers below
           paint on top of this; without an opaque base the WebView
           sometimes flashes its default white before the wash mounts. */
        background: #050608;
        color: #d4c5a1;
        transition: opacity 0.25s ease, visibility 0s linear 0.25s;
        overflow: hidden;
        isolation: isolate;
      }
      body.is-booted #preloader {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      /* Subtle gray dot field beneath the colored wash so dots are
         visible everywhere, not just inside the bloom. */
      #preloader-dots {
        position: absolute;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background-image: radial-gradient(
          circle at 1px 1px,
          rgba(255, 255, 255, 0.05) 1px,
          transparent 1.4px
        );
        background-size: 7px 7px;
      }
      #preloader-stack {
        position: relative;
        z-index: 1;
        width: 88px;
        height: 88px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      /* Bone-colored ring (border-top-color uses the bone tone via
         currentColor inherited from #preloader). Track is the same
         tone at low opacity. */
      #preloader-ring {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 2px solid rgba(212, 197, 161, 0.18);
        border-top-color: currentColor;
        animation: preloader-spin 1.1s linear infinite;
      }
      /* Steady fish — no pulse animation. The 3D bone-textured fish
         loses detail under opacity/scale animation, so we leave it
         static and let the rotating ring carry the motion. */
      #preloader-logo {
        width: 48px;
        height: 48px;
        background: url("/libre_app_icon.png") no-repeat center / contain;
        border-radius: 6px;
      }
      #preloader-label {
        position: relative;
        z-index: 1;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        color: rgba(234, 234, 234, 0.55);
      }
      @keyframes preloader-spin {
        to { transform: rotate(360deg); }
      }
    </style>
    <!-- Floating dev console. Loads BEFORE the React module bundle
         (parser-blocking, no `defer`/`async`) so it can hook
         console.log/.error and window error events before main.tsx
         emits anything. The script gates its own UI on a localStorage
         flag and exposes a 5-tap-on-top-left magic gesture to toggle
         that flag from inside the iPad app — where Safari Web
         Inspector isn't reachable, which is the entire reason this
         file exists ("Loading Fishbones…" stuck on iPad).

         Loaded as an external script (rather than inline) because the
         Tauri CSP is `script-src 'self' 'wasm-unsafe-eval'` — no
         `'unsafe-inline'` — and an external file from the bundled
         /public/ tree counts as 'self'. Console patches always run;
         the panel UI only mounts when the flag is set. -->
    <script src="/devconsole.js"></script>
  </head>
  <body>
    <div id="preloader" role="status" aria-label="Loading Libre">
      <div id="preloader-wash" aria-hidden="true"></div>
      <div id="preloader-dots" aria-hidden="true"></div>
      <div id="preloader-stack" aria-hidden="true">
        <div id="preloader-ring"></div>
        <div id="preloader-logo"></div>
      </div>
      <div id="preloader-label">loading Libre…</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

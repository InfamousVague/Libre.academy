<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- `viewport-fit=cover` lets the page draw into iOS's safe-area
         zone (under the home indicator, behind the dynamic island).
         Without this, WebKit auto-pads the body to keep content
         strictly inside the safe area, which leaves a visible black
         strip at the bottom of the mobile build. We handle our own
         safe-area math via `env(safe-area-inset-*)` in MobileApp.css
         + MobileTabBar.css, so opting into edge-to-edge here is
         what actually delivers the "scroll to the bottom of the
         phone window" feel.
         `maximum-scale=1.0, user-scalable=no` disables pinch-zoom
         AND the input-focus auto-zoom on iOS. The app is its own
         window, not a web page; double-tapping a button shouldn't
         leave the layout zoomed in. iOS 10+ ignores user-scalable=no
         in mobile Safari for accessibility, but inside a Tauri
         WKWebView (where we control the host) it's still honored,
         and the maximum-scale=1.0 alone stops the auto-zoom. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <link rel="icon" type="image/png" href="/libre_app_icon.png" />
    <link rel="apple-touch-icon" href="/libre_app_icon.png" />
    <title>Libre</title>
    <!-- Pre-React video preloader. The main bundle + Monaco take ~1 s
         to parse on a cold launch and React's components can't paint
         until the module graph resolves. Without an inline block the
         user stares at a black window during that window — so we
         render splash.mp4 directly via an HTML `<video autoplay
         muted playsinline>`. The browser starts decoding + painting
         the first frame as soon as the parser hits this element, no
         JS needed, no React needed.

         When React mounts, it renders its own <SplashScreen> (which
         plays the same splash.mp4 on top of this layer). Both
         elements play the same cached file so the visual is
         continuous; the brief overlap during the body.is-booted
         fade is masked by the fact that both surfaces show the
         same artwork. `main.tsx` flips `is-booted` once React has
         taken over, which fades this layer out via the opacity
         transition below. -->
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0a0a0a;
        color: #eaeaea;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      }
      #preloader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        /* Same dark base as before — covers the WebView's default
           white-flash before the first video frame paints. */
        background: #050608;
        overflow: hidden;
        transition: opacity 0.25s ease, visibility 0s linear 0.25s;
      }
      body.is-booted #preloader {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      #preloader-video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        pointer-events: none;
        user-select: none;
        -webkit-user-drag: none;
      }
    </style>
    <!-- Floating dev console. Loads BEFORE the React module bundle
         (parser-blocking, no `defer`/`async`) so it can hook
         console.log/.error and window error events before main.tsx
         emits anything. The script gates its own UI on a localStorage
         flag and exposes a 5-tap-on-top-left magic gesture to toggle
         that flag from inside the iPad app — where Safari Web
         Inspector isn't reachable, which is the entire reason this
         file exists ("Loading Fishbones…" stuck on iPad).

         Loaded as an external script (rather than inline) because the
         Tauri CSP is `script-src 'self' 'wasm-unsafe-eval'` — no
         `'unsafe-inline'` — and an external file from the bundled
         /public/ tree counts as 'self'. Console patches always run;
         the panel UI only mounts when the flag is set. -->
    <script src="/devconsole.js"></script>
  </head>
  <body>
    <div id="preloader" role="status" aria-label="Loading Libre">
      <!-- Autoplay muted playsinline is the only video-playback combo
           browsers (and WKWebView/Webview2) reliably allow without a
           user gesture. preload="auto" tells the browser to download
           and decode aggressively — we want the first frame painted
           before main.tsx has even finished parsing. -->
      <video
        id="preloader-video"
        src="/splash.mp4"
        autoplay
        muted
        playsinline
        preload="auto"
        aria-hidden="true"
      ></video>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- `viewport-fit=cover` lets the page draw into iOS's safe-area
         zone (under the home indicator, behind the dynamic island).
         Without this, WebKit auto-pads the body to keep content
         strictly inside the safe area, which leaves a visible black
         strip at the bottom of the mobile build. We handle our own
         safe-area math via `env(safe-area-inset-*)` in MobileApp.css
         + MobileTabBar.css, so opting into edge-to-edge here is
         what actually delivers the "scroll to the bottom of the
         phone window" feel.
         `maximum-scale=1.0, user-scalable=no` disables pinch-zoom
         AND the input-focus auto-zoom on iOS. The app is its own
         window, not a web page; double-tapping a button shouldn't
         leave the layout zoomed in. iOS 10+ ignores user-scalable=no
         in mobile Safari for accessibility, but inside a Tauri
         WKWebView (where we control the host) it's still honored,
         and the maximum-scale=1.0 alone stops the auto-zoom.

         `interactive-widget=resizes-content` (Safari 16.4+, Chrome
         108+) shrinks the LAYOUT viewport when the soft keyboard
         appears, rather than the default behaviour of only
         shrinking the visual viewport. Load-bearing for the
         Partner Keyboard in the mobile Playground (see
         src/components/PartnerKeyboard/) — without it, the strip
         pinned via `position: fixed; bottom: 0` lands at the
         bottom of the FULL screen (under the keyboard) and we'd
         have to chase its position with a visualViewport scroll
         listener that lags the compositor by a frame. With the
         directive the layout literally shrinks to exclude the
         keyboard, so `bottom: 0` naturally lands at the keyboard's
         top edge. The PartnerKeyboard component still keeps the
         visualViewport math as a fallback for older Safari that
         ignores this directive. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />
    <link rel="icon" type="image/png" href="/libre_app_icon.png" />
    <link rel="apple-touch-icon" href="/libre_app_icon.png" />

    <!-- ── SEO base block ────────────────────────────────────────────
         These meta tags are the static SEO baseline that ships in
         EVERY page. Per-route surfaces (course pages, lesson pages)
         override `document.title` + the `description` meta via the
         `useMeta` hook in `src/hooks/useMeta.ts`. The static defaults
         here cover the homepage + every JS-less crawl (Googlebot
         renders JS but Bingbot / DuckDuckGo / older social-link
         unfurlers don't always; the static block keeps those readers
         honest).

         Canonical: every page resolves to `https://libre.academy`
         (the app routes are query-string driven, not path-based, so
         a single canonical avoids duplicate-content penalties).
         Per-route overrides happen via the `useMeta` hook.

         Open Graph + Twitter Card use the same headline + image
         pair so Slack / Discord / iMessage / etc. unfurls match
         the browser tab title.

         Theme color targets desktop + iOS Safari address-bar
         tinting; we use the libre-dark `#0a0a0a` since that's the
         majority experience. -->
    <title>Libre.academy — A local-first learning platform for code</title>
    <meta name="description" content="Libre.academy is a local-first, open coding-education platform. Install books on JavaScript, TypeScript, Rust, Solidity, and more — run code in real workbenches, track progress, earn certificates, and learn with a private AI tutor that runs entirely on your machine." />
    <meta name="keywords" content="learn to code, programming courses, local-first learning, javascript, typescript, rust, solidity, python, web3, coding tutor, libre academy" />
    <meta name="author" content="Libre.academy" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="theme-color" content="#0a0a0a" />
    <link rel="canonical" href="https://libre.academy/" />

    <!-- Open Graph — Slack / Discord / iMessage / Facebook unfurls -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Libre.academy" />
    <meta property="og:title" content="Libre.academy — A local-first learning platform for code" />
    <meta property="og:description" content="Install coding books, run real code, earn certificates, learn with a private AI tutor. Everything stays on your machine." />
    <meta property="og:url" content="https://libre.academy/" />
    <meta property="og:image" content="https://libre.academy/libre_header.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card — same headline pair, larger image preview. -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Libre.academy — A local-first learning platform for code" />
    <meta name="twitter:description" content="Install coding books, run real code, earn certificates, learn with a private AI tutor. Everything stays on your machine." />
    <meta name="twitter:image" content="https://libre.academy/libre_header.png" />

    <!-- Sitemap pointer for crawlers that read inline links. -->
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />

    <!-- JSON-LD structured data. Two graphs: the brand (Organization)
         and the site (WebSite + SearchAction so Google can offer a
         search-box rich result). The EducationalOrganization sibling
         flags the site to search engines as a learning destination,
         which surfaces it in education-related queries / Lens /
         Discover. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": ["Organization", "EducationalOrganization"],
            "@id": "https://libre.academy/#organization",
            "name": "Libre.academy",
            "url": "https://libre.academy/",
            "logo": "https://libre.academy/libreacademy.png",
            "description": "Open, local-first coding-education platform with installable books, real-code workbenches, and a private AI tutor.",
            "sameAs": [
              "https://github.com/InfamousVague/Libre"
            ]
          },
          {
            "@type": "WebSite",
            "@id": "https://libre.academy/#website",
            "url": "https://libre.academy/",
            "name": "Libre.academy",
            "publisher": { "@id": "https://libre.academy/#organization" },
            "potentialAction": {
              "@type": "SearchAction",
              "target": "https://libre.academy/?q={search_term_string}",
              "query-input": "required name=search_term_string"
            }
          },
          {
            "@type": "SoftwareApplication",
            "name": "Libre.academy",
            "operatingSystem": "macOS, Windows, Linux, iOS, Web",
            "applicationCategory": "EducationalApplication",
            "description": "Local-first learning platform for programmers — installable courses, real-code execution, private AI tutor.",
            "offers": {
              "@type": "Offer",
              "price": "0",
              "priceCurrency": "USD"
            }
          }
        ]
      }
    </script>
    <!-- ── end SEO base block ──────────────────────────────────────── -->
    <!-- Pre-React preloader. The main bundle + Monaco take ~1 s to
         parse on a cold launch and React's bootloader can't paint
         until the module graph resolves — so without this inline
         block the user stares at a black window.

         The markup + styling mirror the React LibreLoader
         (spinning ribbon-snake on a dark backdrop, "loading…"
         caption). The two surfaces show the same artwork, so the
         handoff from the inline preloader to React's
         `.libre__bootloader` is seamless when `body.is-booted`
         flips. `main.tsx` flips that class inside its mount
         effect. -->
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0a0a0a;
        color: #eaeaea;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      }
      /* Tray-popover mode (host window loaded at `?tray=1`). The
         outer Tauri window is frameless + transparent; without
         these overrides the inline preloader would paint a hard
         dark rectangle filling the OS window before React mounts
         the rounded glass card. Detected via the inline script
         below which flips `html.libre-tray-mode` on the very first
         token after `<head>` opens. */
      html.libre-tray-mode,
      html.libre-tray-mode body {
        background: transparent;
      }
      html.libre-tray-mode #preloader {
        /* Match the painted-via-React card: same rounded corners,
           border, shadow, and dark glass tint so the handoff from
           inline preloader to React mount is invisible. */
        background: rgba(10, 10, 14, 0.96);
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.10);
        box-shadow:
          0 18px 48px rgba(0, 0, 0, 0.55),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }
      #preloader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        z-index: 9999;
        background: #050608;
        color: #d4c5a1;
        transition: opacity 0.25s ease, visibility 0s linear 0.25s;
        overflow: hidden;
        isolation: isolate;
      }
      body.is-booted #preloader {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      #preloader-stack {
        position: relative;
        z-index: 1;
        width: 88px;
        height: 88px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      /* Ribbon-snake spinner — the asset is a near-Ouroboros and
         spins continuously to sell the "endless loop" feel. The
         drop-shadow halo gives it presence on the dark preloader
         backdrop. */
      #preloader-logo {
        width: 88px;
        height: 88px;
        background: url("/libre_loader.png") no-repeat center / contain;
        transform-origin: center;
        animation: preloader-spin 1.6s linear infinite;
        filter: drop-shadow(0 0 8px rgba(243, 114, 57, 0.32));
      }
      #preloader-label {
        position: relative;
        z-index: 1;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        color: rgba(234, 234, 234, 0.55);
      }
      @keyframes preloader-spin {
        to { transform: rotate(360deg); }
      }
    </style>
    <!-- Detect the tray-popover mode BEFORE any other script runs so
         the inline preloader's CSS branch (above) can paint its
         rounded glass shape on the very first frame. Without this,
         a cold-launched tray window briefly paints the full-screen
         dark preloader rectangle before React swaps in the rounded
         card. The body element doesn't exist yet at parse time, so
         we tag `html` (which always does). -->
    <script>
      if (location.search.indexOf("tray=1") !== -1) {
        document.documentElement.classList.add("libre-tray-mode");
      }
    </script>
    <!-- Floating dev console. Loads BEFORE the React module bundle
         (parser-blocking, no `defer`/`async`) so it can hook
         console.log/.error and window error events before main.tsx
         emits anything. The script gates its own UI on a localStorage
         flag and exposes a 5-tap-on-top-left magic gesture to toggle
         that flag from inside the iPad app — where Safari Web
         Inspector isn't reachable, which is the entire reason this
         file exists ("Loading Libre…" stuck on iPad).

         Loaded as an external script (rather than inline) because the
         Tauri CSP is `script-src 'self' 'wasm-unsafe-eval'` — no
         `'unsafe-inline'` — and an external file from the bundled
         /public/ tree counts as 'self'. Console patches always run;
         the panel UI only mounts when the flag is set. -->
    <script src="/devconsole.js"></script>
  </head>
  <body>
    <div id="preloader" role="status" aria-label="Loading Libre">
      <div id="preloader-stack" aria-hidden="true">
        <div id="preloader-logo"></div>
      </div>
      <div id="preloader-label">loading…</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
